        "@ | Out-File info.txt -Encoding utf8

    # =====================================================
    # BUILD EXE
    # =====================================================

    - name: Build EXE (onefile)
      shell: pwsh
      run: |
        pyinstaller main.py `
          --onefile `
          --name Diversion `
          --windowed `
          --icon=Diversion.ico `
          --clean `
          --uac-admin `
          --noupx `
          --version-file=version.txt 
          
    # =====================================================
    # CREATE SELF-SIGNED CERTIFICATE
    # =====================================================

    - name: Create self-signed certificate
      shell: pwsh
      run: |
        $cert = New-SelfSignedCertificate `
          -Type CodeSigningCert `
          -Subject "CN=imgui.cc" `
          -KeyAlgorithm RSA `
          -KeyLength 4096 `
          -CertStoreLocation "Cert:\CurrentUser\My"

        $pwd = ConvertTo-SecureString "16i1kyqkpreb90ewtcxkfxfwnfdzbp" -Force -AsPlainText

        Export-PfxCertificate `
          -Cert $cert `
          -FilePath cert.pfx `
          -Password $pwd

    # =====================================================
    # LOCATE SIGNTOOL
    # =====================================================

    - name: Locate signtool
      shell: pwsh
      run: |
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" `
          -Recurse `
          -Filter signtool.exe `
          -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match "x64" } |
          Select-Object -First 1 -ExpandProperty FullName

        if (-not $signtool) {
          throw "signtool.exe not found"
        }

        echo "SIGTOOL_PATH=$signtool" >> $env:GITHUB_ENV

    # =====================================================
    # SIGN EXECUTABLE
    # =====================================================

    - name: Sign executable
      shell: pwsh
      run: |
        $exePath = "dist\Diversion.exe"

        if (-not (Test-Path $exePath)) {
          throw "Executable not found: $exePath"
        }

        & $env:SIGTOOL_PATH sign `
          /f cert.pfx `
          /p 16i1kyqkpreb90ewtcxkfxfwnfdzbp `
          /fd SHA256 `
          /tr http://ts.quovadisglobal.com/eu `
          /td SHA256 `
          $exePath

    # =====================================================
    # PREPARE RELEASE ZIP
    # =====================================================

    - name: Prepare ZIP
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release | Out-Null

        Move-Item dist\Diversion.exe release\
        Move-Item info.txt release\
        Move-Item config.json release\

        if (Test-Path LICENSE) {
          Copy-Item LICENSE release\
        }

        & "C:\Program Files\7-Zip\7z.exe" a `
          -tzip `
          "Diversion-${{ steps.get_version.outputs.version }}.zip" `
          ".\release\*"

    # =====================================================
    # UPLOAD GITHUB RELEASE
    # =====================================================

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        name: Diversion ${{ steps.get_version.outputs.version }}
        tag_name: v${{ steps.get_version.outputs.version }}
        files: Diversion-${{ steps.get_version.outputs.version }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
