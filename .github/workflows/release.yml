name: Release Build (onefile + signing)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write

    steps:

    # =====================================================
    # CHECKOUT
    # =====================================================

    - name: Checkout code
      uses: actions/checkout@v6

    # =====================================================
    # PYTHON SETUP
    # =====================================================

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    # =====================================================
    # INSTALL DEPENDENCIES
    # =====================================================

    - name: Install dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip

        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }

        pip install pyinstaller

    # =====================================================
    # EXTRACT VERSION
    # =====================================================

    - name: Extract FileVersion
      id: get_version
      shell: pwsh
      run: |
        $content = Get-Content version.txt

        foreach ($line in $content) {
          if ($line -match "FileVersion'.*?'(.*?)'") {
            $version = $matches[1]
            break
          }
        }

        if (-not $version) {
          throw "Failed to extract FileVersion from version.txt"
        }

        echo "version=$version" >> $env:GITHUB_OUTPUT

    # =====================================================
    # GENERATE BUILD INFO
    # =====================================================

    - name: Generate build info
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        $kernel = "$env:GITHUB_ACTIONS"
        $osInfo = (Get-CimInstance Win32_OperatingSystem).Caption
        $shellName = $PSVersionTable.PSEdition + " " + $PSVersionTable.PSVersion.ToString()

        $commit = git rev-parse --short HEAD
        $branch = git rev-parse --abbrev-ref HEAD

        $python = (python --version)
        $runner = $env:RUNNER_OS
        $arch = $env:PROCESSOR_ARCHITECTURE

        $version = "${{ steps.get_version.outputs.version }}"

        $packages = (pip freeze | Sort-Object) -join "`r`n"

